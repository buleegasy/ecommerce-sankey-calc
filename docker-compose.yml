version: '3.8'

services:
  db:
    image: postgres:15
    container_name: bi_postgres
    restart: always
    environment:
      POSTGRES_USER: bi_admin
      POSTGRES_PASSWORD: bi_password_2026
      POSTGRES_DB: bi_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  cache:
    image: redis:7
    container_name: bi_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
    driver: local
